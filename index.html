<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3Wise Research Hub — Smart Research. Real African Insights.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #f5f0e8; }
    .display-font { font-family: 'Cormorant Garamond', serif; }
    .gold-text { background: linear-gradient(90deg, #C9A84C, #E8C96A, #C9A84C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Holographic Globe */
    .holo-globe {
      width: 380px;
      height: 380px;
      border-radius: 50%;
      border: 2px solid rgba(201, 168, 76, 0.4);
      box-shadow: 
        0 0 60px rgba(201, 168, 76, 0.6),
        inset 0 0 60px rgba(201, 168, 76, 0.3);
      position: relative;
      overflow: hidden;
      animation: rotate 25s linear infinite;
    }
    .holo-globe::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 40% 30%, rgba(255,255,255,0.15) 0%, transparent 50%),
        linear-gradient(transparent 40%, rgba(201,168,76,0.15) 50%, transparent 60%);
      animation: scan 4s linear infinite;
    }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(300%); } }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-gold/10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="YOUR_LOGO_URL_HERE" alt="3Wise" class="h-10"> <!-- Replace with your logo -->
        <div>
          <span class="display-font text-3xl font-bold">3Wise</span>
          <span class="block text-xs text-gold tracking-widest">RESEARCH HUB</span>
        </div>
      </div>
      <div class="hidden md:flex gap-8 text-sm">
        <a href="#" class="hover:text-gold transition">Services</a>
        <a href="#" class="hover:text-gold transition">About</a>
        <a href="#" class="hover:text-gold transition">Pricing</a>
        <a href="#" class="hover:text-gold transition">Contact</a>
      </div>
      <a href="#" class="bg-gold text-black px-8 py-3.5 rounded-2xl font-semibold">Start Free Survey</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="min-h-screen flex items-center relative hero-bg pt-20">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h1 class="display-font text-6xl md:text-7xl font-bold leading-tight">
          Smart Research.<br>
          <span class="gold-text">Real African Insights.</span>
        </h1>
        <p class="mt-6 text-xl text-gray-300">
          Nigeria's most trusted platform for surveys, market research, and data intelligence.<br>
          Built for Africa, by Africans.
        </p>
        <div class="mt-10 flex gap-4">
          <a href="#" class="bg-gold text-black px-10 py-5 rounded-2xl font-semibold text-lg">Create Your First Survey — Free</a>
        </div>
      </div>

      <!-- Holographic Globe -->
      <div class="flex justify-center">
        <div class="holo-globe"></div>
      </div>
    </div>
  </section>

</body>
</html>
