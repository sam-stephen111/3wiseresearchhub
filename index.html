<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3WISE Research Hub — Empowering Insights Through Intelligence</title>
<meta name="description" content="Premium Research & Analytics for Africa's Next Generation"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Outfit:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#D4AF37;
  --gold-light:#E8C84A;
  --gold-dim:#9A7E26;
  --black:#050505;
  --black2:#0a0a0a;
  --blue-accent:rgba(30,80,200,0.18);
}
html,body{width:100%;height:100%;background:var(--black);overflow-x:hidden;font-family:'Outfit',sans-serif;color:#fff}
canvas#globe{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#hero{position:relative;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* NAVBAR */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4%;height:72px;
  background:rgba(5,5,5,0.55);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:0.5px solid rgba(212,175,55,0.18);
  animation:fadeDown 1s ease both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.nav-logo{display:flex;flex-direction:column;line-height:1;text-decoration:none}
.nav-logo .bold{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:900;color:var(--gold);letter-spacing:0.04em}
.nav-logo .sub{font-size:0.55rem;letter-spacing:0.22em;color:rgba(255,255,255,0.55);font-weight:400;margin-top:1px}
.nav-links{display:flex;gap:2.2rem;list-style:none}
.nav-links a{font-size:0.82rem;font-weight:400;color:rgba(255,255,255,0.7);text-decoration:none;letter-spacing:0.04em;padding-bottom:2px;border-bottom:1.5px solid transparent;transition:all 0.25s}
.nav-links a:hover,.nav-links a.active{color:#fff;border-bottom-color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:0.8rem}
.btn-login{font-size:0.8rem;color:rgba(255,255,255,0.75);background:transparent;border:0.5px solid rgba(255,255,255,0.2);border-radius:50px;padding:7px 18px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.25s;display:flex;align-items:center;gap:6px}
.btn-login:hover{border-color:var(--gold);color:var(--gold)}
.btn-quote{font-size:0.8rem;font-weight:600;color:#000;background:var(--gold);border:none;border-radius:50px;padding:8px 20px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.25s;letter-spacing:0.03em}
.btn-quote:hover{background:var(--gold-light);box-shadow:0 0 18px rgba(212,175,55,0.45)}

/* HERO CONTENT */
.hero-content{
  position:relative;z-index:10;
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:120px 20px 80px;
  animation:fadeUp 1.2s 0.4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* BADGE */
.badge{
  display:inline-flex;flex-direction:column;align-items:center;
  padding:16px 32px 14px;margin-bottom:2.5rem;
  background:rgba(10,10,10,0.65);
  border:1px solid rgba(212,175,55,0.45);
  border-radius:16px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 0 30px rgba(212,175,55,0.08),inset 0 0 20px rgba(212,175,55,0.04);
  animation:fadeUp 1.2s 0.6s ease both;
}
.badge-title{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:900;color:var(--gold);letter-spacing:0.06em;line-height:1}
.badge-sub{font-size:0.6rem;letter-spacing:0.32em;color:rgba(255,255,255,0.55);margin-top:4px;font-weight:400}

/* HEADLINE */
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.8rem,6vw,5.2rem);
  font-weight:900;line-height:1.1;
  color:#fff;margin-bottom:1.2rem;
  letter-spacing:-0.01em;
  max-width:820px;
  animation:fadeUp 1.2s 0.8s ease both;
}
h1 em{
  color:var(--gold);font-style:italic;
  background:linear-gradient(135deg,#D4AF37 0%,#F5D76E 50%,#B8940A 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtext{
  font-size:clamp(0.9rem,1.8vw,1.1rem);
  color:rgba(255,255,255,0.55);
  font-style:italic;font-weight:300;letter-spacing:0.04em;
  margin-bottom:2.8rem;max-width:550px;
  animation:fadeUp 1.2s 1s ease both;
}

/* BUTTONS */
.btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;animation:fadeUp 1.2s 1.1s ease both}
.btn-primary{
  font-size:0.9rem;font-weight:600;color:#000;
  background:linear-gradient(135deg,#D4AF37,#E8C84A,#B8940A);
  border:none;border-radius:50px;padding:14px 34px;cursor:pointer;
  font-family:'Outfit',sans-serif;letter-spacing:0.04em;
  transition:all 0.3s;box-shadow:0 4px 20px rgba(212,175,55,0.3);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,175,55,0.5)}
.btn-secondary{
  font-size:0.9rem;font-weight:500;color:#fff;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(212,175,55,0.5);
  border-radius:50px;padding:14px 34px;cursor:pointer;
  font-family:'Outfit',sans-serif;letter-spacing:0.04em;
  transition:all 0.3s;backdrop-filter:blur(8px);
}
.btn-secondary:hover{background:rgba(212,175,55,0.08);border-color:var(--gold);box-shadow:0 0 20px rgba(212,175,55,0.2);transform:translateY(-2px)}

/* PARTICLES */
.particle{position:absolute;border-radius:50%;pointer-events:none}

/* FLOATING BUTTONS */
.fab-left{
  position:fixed;bottom:28px;left:22px;z-index:200;
  display:flex;align-items:center;gap:8px;
  background:var(--gold);color:#000;
  border:none;border-radius:50px;
  padding:11px 20px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:600;
  animation:float 3s ease-in-out infinite;
  box-shadow:0 4px 20px rgba(212,175,55,0.4);
}
.fab-right{
  position:fixed;bottom:28px;right:22px;z-index:200;
  display:flex;align-items:center;gap:8px;
  background:#25D366;color:#fff;
  border:none;border-radius:50px;
  padding:11px 20px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:600;
  animation:float 3s ease-in-out infinite 0.5s;
  box-shadow:0 4px 20px rgba(37,211,102,0.35);
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(20px,-25px) scale(1.2)}
  66%{transform:translate(-15px,15px) scale(0.9)}
}

/* MOBILE MENU */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.hamburger span{width:22px;height:1.5px;background:var(--gold);border-radius:2px;display:block;transition:all 0.3s}
.mobile-nav{display:none;position:fixed;top:72px;left:0;right:0;z-index:99;
  background:rgba(5,5,5,0.97);backdrop-filter:blur(20px);
  padding:1.5rem 2rem;border-bottom:0.5px solid rgba(212,175,55,0.2)}
.mobile-nav.open{display:flex;flex-direction:column;gap:1.2rem}
.mobile-nav a{color:rgba(255,255,255,0.75);text-decoration:none;font-size:0.95rem;letter-spacing:0.04em;border-bottom:0.5px solid rgba(255,255,255,0.06);padding-bottom:1rem;transition:color 0.2s}
.mobile-nav a:hover{color:var(--gold)}

/* AMBIENT GLOW */
.glow-top{position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:60%;height:50%;background:radial-gradient(ellipse,rgba(212,175,55,0.06) 0%,transparent 70%);pointer-events:none;z-index:1}
.glow-blue{position:absolute;bottom:10%;right:-5%;width:40%;height:40%;background:radial-gradient(ellipse,rgba(30,80,200,0.07) 0%,transparent 70%);pointer-events:none;z-index:1}

@media(max-width:900px){
  .nav-links{display:none}.btn-login{display:none}.hamburger{display:flex}
}
@media(max-width:600px){
  h1{font-size:2.4rem}.badge-title{font-size:1.6rem}
  .btns{flex-direction:column;align-items:center}
  .btn-primary,.btn-secondary{width:220px;text-align:center}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // === THREE.JS GLOBE ===
  const canvas = document.getElementById('globe');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 2.8;

  // Main wireframe globe
  const globeGeo = new THREE.SphereGeometry(1, 36, 36);
  const globeMat = new THREE.MeshBasicMaterial({
    color: 0xD4AF37, wireframe: true, transparent: true, opacity: 0.18
  });
  const globe = new THREE.Mesh(globeGeo, globeMat);
  scene.add(globe);

  // Inner glow shell
  const glowGeo = new THREE.SphereGeometry(1.02, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xD4AF37, transparent: true, opacity: 0.03, side: THREE.BackSide
  });
  scene.add(new THREE.Mesh(glowGeo, glowMat));

  // Orbiting dot particles
  const pCount = 120;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount * 3);
  const pRadii = new Float32Array(pCount);
  const pSpeeds = new Float32Array(pCount);
  const pAngles = new Float32Array(pCount);
  const pInclinations = new Float32Array(pCount);

  for(let i = 0; i < pCount; i++){
    const r = 1.15 + Math.random() * 0.55;
    pRadii[i] = r;
    pSpeeds[i] = 0.002 + Math.random() * 0.004;
    pAngles[i] = Math.random() * Math.PI * 2;
    pInclinations[i] = (Math.random() - 0.5) * Math.PI;
    pPos[i*3]   = r * Math.cos(pAngles[i]);
    pPos[i*3+1] = r * Math.sin(pInclinations[i]);
    pPos[i*3+2] = r * Math.sin(pAngles[i]);
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const pMat = new THREE.PointsMaterial({color:0xD4AF37, size:0.012, transparent:true, opacity:0.8});
  const orbits = new THREE.Points(pGeo, pMat);
  scene.add(orbits);

  // Decorative rings
  [
    {r:1.4, opacity:0.20, rx:0.3, rz:0.0},
    {r:1.7, opacity:0.10, rx:0.9, rz:0.3}
  ].forEach(cfg => {
    const rGeo = new THREE.TorusGeometry(cfg.r, 0.003, 8, 120);
    const rMat = new THREE.MeshBasicMaterial({color:0xD4AF37, transparent:true, opacity:cfg.opacity});
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = cfg.rx;
    ring.rotation.z = cfg.rz;
    scene.add(ring);
  });

  // Animation loop
  function animate(){
    requestAnimationFrame(animate);
    globe.rotation.y += 0.0025;
    globe.rotation.x += 0.0005;

    const pos = pGeo.attributes.position.array;
    for(let i = 0; i < pCount; i++){
      pAngles[i] += pSpeeds[i];
      const r = pRadii[i];
      pos[i*3]   = r * Math.cos(pAngles[i]);
      pos[i*3+2] = r * Math.sin(pAngles[i]);
    }
    pGeo.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // === DOM PARTICLES ===
  const pContainer = document.getElementById('particles');
  const colors = [
    'rgba(212,175,55,0.7)','rgba(212,175,55,0.4)',
    'rgba(255,255,255,0.3)','rgba(30,80,200,0.4)'
  ];
  for(let i = 0; i < 38; i++){
    const d = document.createElement('div');
    d.className = 'particle';
    const s = 2 + Math.random() * 4;
    const dx = ((Math.random() - 0.5) * 40).toFixed(0);
    const dy = ((Math.random() - 0.5) * 40).toFixed(0);
    const dur = (8 + Math.random() * 12).toFixed(1);
    const delay = (Math.random() * 6).toFixed(1);
    d.style.cssText = `
      width:${s}px;height:${s}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${(Math.random()*100).toFixed(1)}%;
      top:${(Math.random()*100).toFixed(1)}%;
      position:absolute;
      animation:pdrift${i} ${dur}s ${delay}s ease-in-out infinite;
      opacity:${(0.3+Math.random()*0.7).toFixed(2)};
    `;
    pContainer.appendChild(d);

    const ks = document.createElement('style');
    ks.textContent = `@keyframes pdrift${i}{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(${dx}px,${dy}px) scale(1.2)}}`;
    document.head.appendChild(ks);
  }
})();

// Mobile menu toggle
function toggleMenu(){
  document.getElementById('mobileNav').classList.toggle('open');
}
</script>
